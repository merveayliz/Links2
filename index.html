<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Von Stein Luxury | Elite Links</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --rich-black: #0a0a0a;
            --silver-linear: linear-gradient(135deg, #cfd9df 0%, #e2ebf0 100%);
            --silver-text: #e2e8f0;
            --metallic-border: rgba(255, 255, 255, 0.15);
            --luxury-glow: rgba(226, 232, 240, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Times New Roman', serif; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--rich-black);
            background-image: 
                radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--silver-text);
            overflow-x: hidden;
            overflow-y: auto;
            padding: 40px 0;
        }

        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1), visibility 1.5s;
        }

        .splash-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0;
            transform: scale(0.5);
            animation: logoReveal 3s forwards;
        }

        .splash-text {
            font-size: 1.5rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 300;
            opacity: 0;
            animation: textReveal 3s 0.5s forwards;
        }

        @keyframes logoReveal {
            0% { transform: scale(0.5) rotate(45deg); opacity: 0; filter: blur(10px); }
            50% { transform: scale(1.1) rotate(0deg); opacity: 1; filter: blur(0px); }
            100% { transform: scale(1); opacity: 0; filter: blur(5px); }
        }

        @keyframes textReveal {
            0% { letter-spacing: 20px; opacity: 0; }
            50% { letter-spacing: 8px; opacity: 1; }
            100% { letter-spacing: 12px; opacity: 0; }
        }

        #main-content {
            opacity: 0;
            transform: scale(0.98);
            transition: opacity 2s ease, transform 2s ease;
            width: 90%;
            max-width: 420px;
            text-align: center;
            display: none;
            z-index: 10;
        }

        .brand-section {
            margin-bottom: 40px;
        }

        .brand-logo {
            width: 60px;
            height: 60px;
            border: 1px solid var(--metallic-border);
            padding: 10px;
            margin-bottom: 20px;
            background: linear-gradient(145deg, #111, #222);
            border-radius: 50%;
            display: inline-block;
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 400;
            background: linear-gradient(to bottom, #fff 0%, #999 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.6;
            font-family: 'Inter', sans-serif;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        .link-card {
            background: linear-gradient(145deg, #151515, #0a0a0a);
            border: 1px solid var(--metallic-border);
            padding: 20px 30px;
            border-radius: 4px; 
            text-decoration: none;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.05),
                transparent
            );
            transition: 0.5s;
        }

        .link-card:hover::before {
            left: 100%;
        }

        .link-card:hover {
            border-color: #fff;
            background: #111;
            transform: translateX(10px);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .link-info {
            display: flex;
            align-items: center;
            gap: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .link-card i {
            width: 20px;
            height: 20px;
            color: #ccc;
        }

        footer {
            margin-top: 60px;
            padding-bottom: 20px;
        }

        .designer-tag {
            text-decoration: none;
            color: inherit;
            font-size: 0.75rem;
            letter-spacing: 2px;
            opacity: 0.4;
            transition: opacity 0.3s;
            text-transform: uppercase;
        }

        .designer-tag:hover {
            opacity: 1;
            color: #fff;
        }

        .designer-tag span {
            font-weight: bold;
            color: #fff;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            .link-card { padding: 16px 20px; }
        }
    </style>
</head>
<body>

    <div id="splash">
        <svg class="splash-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 20L50 80L80 20" stroke="white" stroke-width="2"/>
            <path d="M50 80V40" stroke="white" stroke-width="1" stroke-dasharray="4 4"/>
        </svg>
        <div class="splash-text">Von Stein</div>
    </div>

    <div id="main-content">
        <header class="brand-section">
            <div class="brand-logo">
                <i data-lucide="crown" style="color: #fff; width: 100%; height: 100%;"></i>
            </div>
            <h1>Von Stein</h1>
            <p class="tagline">Exclusive Lifestyle & Estates</p>
        </header>

        <nav class="links-container">
            <a href="#" class="link-card">
                <div class="link-info">
                    <i data-lucide="gem"></i>
                    <span>Elite Collection</span>
                </div>
                <i data-lucide="arrow-up-right"></i>
            </a>

            <a href="#" class="link-card">
                <div class="link-info">
                    <i data-lucide="map-pin"></i>
                    <span>Private Estates</span>
                </div>
                <i data-lucide="arrow-up-right"></i>
            </a>

            <a href="#" class="link-card">
                <div class="link-info">
                    <i data-lucide="concierge-bell"></i>
                    <span>Concierge Services</span>
                </div>
                <i data-lucide="arrow-up-right"></i>
            </a>

            <a href="#" class="link-card">
                <div class="link-info">
                    <i data-lucide="instagram"></i>
                    <span>Our Legacy</span>
                </div>
                <i data-lucide="arrow-up-right"></i>
            </a>
        </nav>

        <footer>
            <a href="https://www.linkedin.com/in/ayliz-azaklı-74579b318/" target="_blank" class="designer-tag">
                by desıgner <span>aylızdev</span>
            </a>
        </footer>
    </div>

    <script>
        lucide.createIcons();

        window.addEventListener('load', () => {
            const splash = document.getElementById('splash');
            const mainContent = document.getElementById('main-content');

            setTimeout(() => {
                splash.style.opacity = '0';
                
                setTimeout(() => {
                    splash.style.visibility = 'hidden';
                    mainContent.style.display = 'block';
                    
                    setTimeout(() => {
                        mainContent.style.opacity = '1';
                        mainContent.style.transform = 'scale(1)';
                    }, 50);
                }, 1000);
            }, 3500);
        });
    </script>
</body>
</html>
